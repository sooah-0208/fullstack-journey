name: "📅 Daily Checklist"
description: "오늘의 할 일과 발생한 이슈를 기록합니다."
labels: ["daily", "check-list"]
body:
  - type: input
    id: date
    attributes:
      label: 🗓️ 날짜
      placeholder: "예: 2026.04.06"
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: ✅ 오늘의 할 일
      description: 오늘 완료할 작업들을 체크박스로 작성해 주세요.
      placeholder: |
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: issues
    attributes:
      label: ⚠️ 발생 이슈
      description: 작업 중 마주친 문제나 에러를 적어주세요.
      placeholder: "에러 로그나 발생 상황을 간단히 적어주세요."
  - type: textarea
    id: follow-up
    attributes:
      label: 🚀 추가 작업 필요
      description: 오늘 다 끝내지 못했거나 내일 이어서 해야 할 작업입니다.
  - type: textarea
    id: review
    attributes:
      label: 💭 리뷰
      description: 오늘 하루 작업에 대한 스스로의 피드백이나 소감을 남겨주세요.
