services:
  py-jupyter:
    container_name: py-jupyter
    image: my-jupyter:latest
    ports:
      - 8888:8888
    networks:
      - my-bridge
    volumes:
      - ./works:/opt/jupyter/works:rw
      - ./data:/opt/spark/data:rw
      - ./output:/opt/spark/output:ro

  master:
    container_name: master
    image: my-spark:latest
    ports:
      - 8080:8080
      - 7077:7077
    networks:
      - my-bridge
    environment:
      - SPARK_PUBLIC_DNS=${HOST_IP}
    volumes:
      - ./works:/opt/jupyter/works:rw
      - ./data:/opt/spark/data:rw
      - ./output:/opt/spark/output:rw
    command: start-master.sh

  worker-1:
    container_name: worker-1
    image: my-spark:latest
    depends_on:
      - master
    ports:
      - 8081:8081
    networks:
      - my-bridge
    environment:
      - SPARK_PUBLIC_DNS=${HOST_IP}
    volumes:
      - ./works:/opt/jupyter/works:rw
      - ./data:/opt/spark/data:rw
      - ./output:/opt/spark/output:rw
    command: start-worker.sh spark://master:7077

  worker-2:
    container_name: worker-2
    image: my-spark:latest
    depends_on:
      - master
    ports:
      - 8082:8081
    networks:
      - my-bridge
    environment:
      - SPARK_PUBLIC_DNS=${HOST_IP}
    volumes:
      - ./works:/opt/jupyter/works:rw
      - ./data:/opt/spark/data:rw
      - ./output:/opt/spark/output:rw
    command: start-worker.sh spark://master:7077

networks:
  my-bridge:
    driver: bridge